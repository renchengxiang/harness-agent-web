# Docker Compose for Harness Agent Web Platform
# 启动：  docker compose up -d --build
# 停止：  docker compose down
# 日志：  docker compose logs -f

services:
  # --- Nginx 网关入口 ---
  nginx:
    image: nginx:alpine
    container_name: harness-nginx
    restart: unless-stopped
    ports:
      - "8002:80"  # 外部只需访问 8002 即可
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_healthy
    networks:
      - harness-net

  # --- 后端服务 ---
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    image: harness-agent-backend:latest
    container_name: harness-backend
    restart: unless-stopped
    # 提示：如果不想暴露后端 8000 端口给公网，可以把下面 "8000:8000" 注释掉
    # 这样后端就只能通过 Nginx/内网 访问，更安全。
    ports:
      - "8000:8000"
      # 预览服务端口范围：start_preview 从 5050 起逐个挑可用端口
      - "5050-5060:5050-5060"
    environment:
      HARNESS_USERS_ROOT: /data/harness_users
      HARNESS_DB_PATH: /data/harness.db
      SVG_EDITOR_HOST: 0.0.0.0
      HARNESS_JWT_SECRET: ${HARNESS_JWT_SECRET:?请在 .env 中设置 HARNESS_JWT_SECRET（>=32 字符）}
      HARNESS_ADMIN_USERNAME: ${HARNESS_ADMIN_USERNAME:-admin}
      HARNESS_ADMIN_PASSWORD: ${HARNESS_ADMIN_PASSWORD:-admin123}
    volumes:
      - harness_data:/data
      - ${HOME}/.openharness:/root/.openharness
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/docs')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - harness-net

  # --- 前端服务 ---
  frontend:
    build:
      context: ./frontend/web
      dockerfile: Dockerfile
      args:
        # 修改为相对路径 /api，浏览器会请求 当前域名:8002/api/...
        NEXT_PUBLIC_API_URL: /api
    image: harness-agent-frontend:latest
    container_name: harness-frontend
    restart: unless-stopped
    # 删除了 ports: "8002:3000"，保护前端不被直接外网访问
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - harness-net

volumes:
  harness_data:
    name: harness_data

networks:
  harness-net:
    name: harness-net
    driver: bridge