# Docker Compose for Harness Agent Web Platform
# 启动：  docker compose up -d --build
# 停止：  docker compose down
# 日志：  docker compose logs -f backend
# 重启：  docker compose restart backend

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    image: harness-agent-backend:latest
    container_name: harness-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      # 工作目录 / 数据库都指向挂卷，方便持久化
      HARNESS_USERS_ROOT: /data/harness_users
      HARNESS_DB_PATH: /data/harness.db
      # 可选：透传 host 上的 API key 给容器里的 oh
      # ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      # OPENAI_API_KEY: ${OPENAI_API_KEY}
    volumes:
      # 用户工作目录（每个任务生成的代码 / 产物）
      - harness_users:/data/harness_users
      # SQLite 数据库
      - harness_db:/data/harness.db
      # 可选：把 host 上的项目目录挂给 agent 编辑
      # 取消下一行注释并改成你的项目路径
      # - /Users/pc/www:/projects:rw
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/docs')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - harness-net

  frontend:
    build:
      context: ./frontend/web
      dockerfile: Dockerfile
      args:
        # 浏览器端通过 8000 端口访问后端（docker host 的 localhost）
        # 如果用反向代理，可以改成 '/api'
        NEXT_PUBLIC_API_URL: http://localhost:8000
    image: harness-agent-frontend:latest
    container_name: harness-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - harness-net

volumes:
  harness_users:
    name: harness_users
  harness_db:
    name: harness_db

networks:
  harness-net:
    name: harness-net
    driver: bridge
